<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HopeSpot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F7FA;color:#1F2D3D;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:#1F2D3D}
.logo svg{color:#F97316}
.nav-tabs{display:flex;border-bottom:2px solid #E5E7EB;margin:0 24px;background:#fff;position:sticky;top:56px;z-index:99;padding-top:12px}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{color:#1F2D3D}
.tab.active{color:#F97316;border-bottom-color:#F97316;font-weight:600}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;background:#F97316;color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:0 4px}
.badge.green{background:#10B981}.badge.blue{background:#3B82F6}.badge.purple{background:#8B5CF6}.badge.gray{background:#9CA3AF}.badge.urgent{background:#EF4444}
.main{padding:16px 24px}
/* Queue */
.queue-date{font-size:11px;color:#9CA3AF;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.queue-title{font-size:20px;font-weight:700;margin-bottom:4px}
.queue-sub{font-size:13px;color:#6B7280;margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:20px}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#1F2D3D}
.section-count{font-size:12px;color:#9CA3AF}
.queue-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.queue-card.followup{border-left:3px solid #F59E0B}
.queue-card.followup-overdue{border-left:3px solid #EF4444}
.pillar-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.pillar-recruiter{background:#EFF6FF;color:#3B82F6}
.pillar-ceo{background:#FFF7ED;color:#F97316}
.pillar-vc{background:#ECFDF5;color:#10B981}
.queue-info{flex:1;min-width:0}
.queue-name{font-size:14px;font-weight:600;margin-bottom:2px}
.queue-contact{font-size:12px;color:#6B7280}
.queue-email{font-size:11px;color:#9CA3AF;font-family:monospace}
.queue-meta{font-size:11px;color:#9CA3AF;margin-top:3px}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap}
.btn-send{background:#F97316;color:#fff}.btn-send:hover{background:#ea6c06}
.btn-followup{background:#F3F4F6;color:#1F2D3D}.btn-followup:hover{background:#E5E7EB}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:10px 12px;border:1px solid #E5E7EB}
.stat-label{font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:600;color:#1F2D3D}
.stat-sub{font-size:10px;color:#9CA3AF;margin-top:2px}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dash-grid.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:700px){.dash-grid,.dash-grid.three{grid-template-columns:1fr}}
.dash-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px}
.dash-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9CA3AF;margin-bottom:12px}
.seg-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #F3F4F6}
.seg-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.seg-name{font-size:13px;font-weight:600;flex:1}
.seg-stat{text-align:right;min-width:40px}
.seg-stat-val{font-size:15px;font-weight:600;color:#1F2D3D}
.seg-stat-lbl{font-size:10px;color:#9CA3AF}
.bar-wrap{flex:1;height:6px;background:#F3F4F6;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-blue{background:#3B82F6}.bar-orange{background:#F97316}.bar-green{background:#10B981}
.daily-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.daily-date{color:#9CA3AF;width:64px;flex-shrink:0}
.daily-bars{flex:1;display:flex;gap:3px;align-items:flex-end;height:20px}
.daily-bar{border-radius:2px 2px 0 0;min-width:6px}
.daily-total{font-weight:600;color:#1F2D3D;width:24px;text-align:right}
.big-num{font-size:36px;font-weight:700;color:#1F2D3D;line-height:1}
.big-sub{font-size:12px;color:#9CA3AF;margin-top:4px}
.rate-circle{display:flex;flex-direction:column;align-items:center;justify-content:center;width:80px;height:80px;border-radius:50%;border:3px solid #E5E7EB;margin:0 auto 8px}
.rate-pct{font-size:20px;font-weight:700;color:#1F2D3D}
.rate-lbl{font-size:9px;color:#9CA3AF;text-transform:uppercase}
/* Cards / list */
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-box{flex:1;min-width:160px;padding:7px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none}
.search-box:focus{border-color:#F97316}
.filter-btn{padding:5px 10px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;font-size:11px;cursor:pointer;color:#6B7280}
.filter-btn.active,.filter-btn:hover{background:#FFF7ED;color:#F97316;border-color:#F97316}
.cards{display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border-radius:10px;border:1px solid #E5E7EB;overflow:hidden}
.card-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.tier-badge{background:#F3F4F6;color:#6B7280;font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px}
.card-name{font-size:14px;font-weight:600;flex:1}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdot-contacted{background:#3B82F6}.sdot-in-conversation{background:#10B981}
.sdot-not-contacted{background:#D1D5DB}.sdot-passed{background:#EF4444}
.sdot-bounced{background:#F59E0B}.sdot-draft{background:#8B5CF6}.sdot-linkedin{background:#0EA5E9}
.status-lbl{font-size:11px;color:#9CA3AF}
.card-body{padding:0 14px 12px;border-top:1px solid #F3F4F6;display:none}
.card-body.open{display:block}
.why{font-size:12px;color:#6B7280;margin:8px 0;line-height:1.5}
.contact-row{display:flex;align-items:flex-start;gap:8px;padding:7px;background:#F9FAFB;border-radius:6px;margin-bottom:5px;font-size:12px}
.contact-info{flex:1}
.contact-name{font-weight:600;color:#1F2D3D;margin-bottom:1px}
.contact-title{color:#9CA3AF;font-size:11px;margin-bottom:2px}
.contact-email{color:#F97316;font-family:monospace;font-size:11px}
.contact-notes{color:#6B7280;font-size:11px;margin-top:2px;font-style:italic}
.cs-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap}
.cs-draft{background:#EDE9FE;color:#6D28D9}.cs-linkedin{background:#E0F2FE;color:#0369A1}
.cs-bounced{background:#FEF3C7;color:#D97706}.cs-passed{background:#FEE2E2;color:#EF4444}
.cs-in-conversation{background:#ECFDF5;color:#059669}.cs-contacted{background:#EFF6FF;color:#3B82F6}
.cs-not-contacted{background:#F3F4F6;color:#6B7280}
.field-row{display:flex;gap:6px;align-items:flex-start;margin-top:8px}
.notes-input{flex:1;padding:6px 10px;border:1px solid #E5E7EB;border-radius:6px;font-size:12px;min-height:48px;resize:vertical;font-family:inherit;outline:none}
.notes-input:focus{border-color:#F97316}
.status-select,.date-input{padding:5px 8px;border:1px solid #E5E7EB;border-radius:6px;font-size:12px;outline:none;background:#fff}
.save-btn{padding:5px 12px;background:#F97316;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500}
.sec-lbl{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.empty{text-align:center;padding:48px 20px;color:#9CA3AF}
.divider{height:1px;background:#F3F4F6;margin:16px 0}
/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:12px;padding:36px;max-width:380px;width:100%;border:1px solid #E5E7EB;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:13px;color:#9CA3AF;margin-bottom:24px}
.login-input{width:100%;padding:10px 14px;border:1px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px}
.login-btn{width:100%;padding:10px;background:#F97316;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-err{color:#EF4444;font-size:12px;margin-top:8px;display:none}
.login-status{font-size:12px;color:#9CA3AF;margin-top:8px;text-align:center}
</style>
</head>
<body>

<div id="login-view" class="login-wrap">
  <div class="login-box">
    <div class="login-title">HopeSpot</div>
    <div class="login-sub">Could've used HubSpot.</div>
    <input class="login-input" type="password" id="pw-input" placeholder="Password (if set)" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="login-error">Wrong password.</div>
    <div class="login-status" id="login-status">Connecting...</div>
  </div>
</div>

<div id="app-view" style="display:none">
  <div class="topbar">
    <div class="logo">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      HopeSpot
    </div>
    <div style="font-size:11px;color:#9CA3AF">Built instead of applying.</div>
  </div>
  <div class="nav-tabs">
    <div class="tab active" id="tab-queue"      onclick="switchTab('queue')">Queue <span class="badge urgent" id="badge-queue">0</span></div>
    <div class="tab"        id="tab-dashboard"  onclick="switchTab('dashboard')">Dashboard</div>
    <div class="tab"        id="tab-recruiters" onclick="switchTab('recruiters')">Recruiters <span class="badge" id="badge-recruiters">0</span></div>
    <div class="tab"        id="tab-ceos"       onclick="switchTab('ceos')">Direct CEO <span class="badge blue" id="badge-ceos">0</span></div>
    <div class="tab"        id="tab-vcs"        onclick="switchTab('vcs')">VC Firms <span class="badge green" id="badge-vcs">0</span></div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<script>
let TOKEN='', DATA=[], CEOs=[], VCs=[], STATS=null;
let FILTER='all', TAB='queue';
const TODAY=new Date().toISOString().split('T')[0];

function setStatus(m){const e=document.getElementById('login-status');if(e)e.textContent=m;}

async function init(){
  setStatus('Connecting...');
  try{
    const r=await fetch('/api/auth-required').then(x=>x.json());
    if(!r.required){TOKEN='no-auth';setStatus('Loading...');await loadAll();showApp();}
    else setStatus('Enter password to continue.');
  }catch(e){setStatus('Could not reach server. Try refreshing.');}
}
async function doLogin(){
  const pw=document.getElementById('pw-input').value;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}).then(x=>x.json());
    if(r.ok){TOKEN=r.token;setStatus('Loading...');await loadAll();showApp();}
    else document.getElementById('login-error').style.display='block';
  }catch(e){setStatus('Login failed. Try refreshing.');}
}
async function loadAll(){
  const h={'x-auth-token':TOKEN};
  try{
    [DATA,CEOs,VCs,STATS]=await Promise.all([
      fetch('/api/firms',{headers:h}).then(x=>x.json()),
      fetch('/api/ceos', {headers:h}).then(x=>x.json()),
      fetch('/api/vcs',  {headers:h}).then(x=>x.json()),
      fetch('/api/stats',{headers:h}).then(x=>x.json()),
    ]);
  }catch(e){DATA=[];CEOs=[];VCs=[];STATS=null;}
  updateBadges();renderCurrent();
}
function showApp(){
  document.getElementById('login-view').style.display='none';
  document.getElementById('app-view').style.display='block';
}
function allItems(){
  return[
    ...DATA.map(x=>({...x,_pillar:'recruiter',_endpoint:'/api/firms',_label:'Recruiter'})),
    ...CEOs.map(x=>({...x,_pillar:'ceo',_endpoint:'/api/ceos',_label:'CEO',name:x.company})),
    ...VCs.map(x=> ({...x,_pillar:'vc', _endpoint:'/api/vcs', _label:'VC', name:x.firm})),
  ];
}
function updateBadges(){
  const all=allItems();
  const drafts=all.filter(x=>x.status==='draft').length;
  const overdue=all.filter(x=>x.status==='contacted'&&x.followup_date&&x.followup_date<=TODAY).length;
  document.getElementById('badge-queue').textContent=drafts+overdue;
  document.getElementById('badge-recruiters').textContent=DATA.filter(x=>['contacted','in conversation','draft'].includes(x.status)).length;
  document.getElementById('badge-ceos').textContent=CEOs.filter(x=>['contacted','in conversation','draft'].includes(x.status)).length;
  document.getElementById('badge-vcs').textContent=VCs.filter(x=>['contacted','in conversation','draft'].includes(x.status)).length;
}
function switchTab(t){
  TAB=t;FILTER='all';
  ['queue','dashboard','recruiters','ceos','vcs'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
  renderCurrent();
}
function renderCurrent(){
  if(TAB==='queue')renderQueue();
  else if(TAB==='dashboard')renderDashboard();
  else renderList();
}

// ── QUEUE ─────────────────────────────────────────────
function renderQueue(){
  const all=allItems();
  const sendNow=all.filter(x=>x.status==='draft');
  const followUp=all.filter(x=>x.status==='contacted'&&x.followup_date&&x.followup_date<=TODAY).sort((a,b)=>a.followup_date>b.followup_date?1:-1);
  const dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const totalMin=Math.round(sendNow.length*0.4+followUp.length*1.5);
  let html=`<div class="queue-date">${dateStr}</div><div class="queue-title">Morning Queue</div><div class="queue-sub">${sendNow.length} to send &nbsp;·&nbsp; ${followUp.length} follow-ups &nbsp;·&nbsp; ~${totalMin} min</div><div class="section-header"><div class="section-title">Send Now</div><div class="section-count">${sendNow.length} drafts waiting</div></div>`;
  if(!sendNow.length){html+='<div class="empty" style="padding:20px">Queue is clear.</div>';}
  else{['recruiter','ceo','vc'].forEach(p=>{sendNow.filter(x=>x._pillar===p).forEach(item=>{const c=(item.contacts||[]).find(c=>c.status==='draft')||(item.contacts||[])[0]||{};html+=`<div class="queue-card"><span class="pillar-tag pillar-${p}">${item._label}</span><div class="queue-info"><div class="queue-name">${item.name}</div><div class="queue-contact">${c.name||''}</div><div class="queue-email">${c.email||''}</div></div><button class="btn btn-send" onclick="markSent('${item._endpoint}',${item.id},this)">Mark Sent</button></div>`;});});}
  html+=`<div class="divider"></div><div class="section-header"><div class="section-title">Follow Up Today</div><div class="section-count">${followUp.length} due</div></div>`;
  if(!followUp.length){html+='<div class="empty" style="padding:20px">No follow-ups due.</div>';}
  else{followUp.forEach(item=>{const c=(item.contacts||[])[0]||{};const da=item.last_contacted?Math.floor((new Date()-new Date(item.last_contacted))/864e5):null;const ov=item.followup_date<TODAY;html+=`<div class="queue-card ${ov?'followup-overdue':'followup'}"><span class="pillar-tag pillar-${item._pillar}">${item._label}</span><div class="queue-info"><div class="queue-name">${item.name}</div><div class="queue-contact">${c.name||''} &nbsp;·&nbsp; ${c.email||''}</div><div class="queue-meta">Last contacted ${da!=null?da+' days ago':'—'} &nbsp;·&nbsp; Due ${item.followup_date}</div></div><button class="btn btn-followup" onclick="logFollowup('${item._endpoint}',${item.id})">Log</button></div>`;});}
  document.getElementById('main-content').innerHTML=html;
}
async function markSent(endpoint,id,btn){
  btn.textContent='Sent ✓';btn.disabled=true;btn.style.background='#10B981';
  const followup=new Date(Date.now()+7*864e5).toISOString().split('T')[0];
  await fetch(`${endpoint}/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','x-auth-token':TOKEN},body:JSON.stringify({status:'contacted',followup_date:followup})});
  await loadAll();
}
async function logFollowup(endpoint,id){
  const note=prompt('Follow-up note (blank to just reset date):');
  const newDate=new Date(Date.now()+7*864e5).toISOString().split('T')[0];
  const payload={followup_date:newDate};if(note)payload.notes=note;
  await fetch(`${endpoint}/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','x-auth-token':TOKEN},body:JSON.stringify(payload)});
  await loadAll();
}

// ── DASHBOARD ─────────────────────────────────────────
function renderDashboard(){
  if(!STATS){document.getElementById('main-content').innerHTML='<div class="empty">Loading stats...</div>';return;}
  const {segments,daily,totals}=STATS;
  const overallRate=totals.contacted>0?Math.round((totals.inConversation/totals.contacted)*100):0;
  const maxDaily=daily.length?Math.max(...daily.map(d=>d.total),1):1;

  // Top KPI row
  let html=`<div class="stats">
    <div class="stat"><div class="stat-label">Total Outreach</div><div class="stat-val">${totals.contacted}</div><div class="stat-sub">sent & delivered</div></div>
    <div class="stat"><div class="stat-label">In Conversation</div><div class="stat-val">${totals.inConversation}</div><div class="stat-sub">active replies</div></div>
    <div class="stat"><div class="stat-label">Response Rate</div><div class="stat-val">${overallRate}%</div><div class="stat-sub">across all segments</div></div>
    <div class="stat"><div class="stat-label">Drafts Ready</div><div class="stat-val">${totals.drafts}</div><div class="stat-sub">queued to send</div></div>
    <div class="stat"><div class="stat-label">Bounced</div><div class="stat-val">${totals.bounced}</div><div class="stat-sub">need alt contact</div></div>
  </div>`;

  // Segment breakdown
  const segColors=['bar-blue','bar-orange','bar-green'];
  html+=`<div class="dash-grid three">`;
  segments.forEach((s,i)=>{
    const pct=s.contacted>0?Math.round((s.conv/s.contacted)*100):0;
    const barW=s.contacted>0?Math.round((s.contacted/Math.max(...segments.map(x=>x.contacted),1))*100):0;
    html+=`<div class="dash-card">
      <div class="dash-card-title">${s.label}</div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px">
        <div><div class="big-num">${s.contacted}</div><div class="big-sub">contacted</div></div>
        <div class="rate-circle" style="border-color:${i===0?'#3B82F6':i===1?'#F97316':'#10B981'}">
          <div class="rate-pct">${pct}%</div><div class="rate-lbl">reply rate</div>
        </div>
      </div>
      <div class="seg-row"><span style="font-size:12px;color:#6B7280;flex:1">In conversation</span><span style="font-size:13px;font-weight:600">${s.conv}</span></div>
      <div class="seg-row"><span style="font-size:12px;color:#6B7280;flex:1">Drafts pending</span><span style="font-size:13px;font-weight:600;color:#8B5CF6">${s.drafts}</span></div>
      <div class="seg-row"><span style="font-size:12px;color:#6B7280;flex:1">Bounced</span><span style="font-size:13px;font-weight:600;color:#F59E0B">${s.bounced}</span></div>
    </div>`;
  });
  html+=`</div>`;

  // Daily activity chart
  html+=`<div class="dash-card" style="margin-bottom:16px">
    <div class="dash-card-title">Daily Outreach Activity</div>`;
  if(!daily.length){html+='<div style="color:#9CA3AF;font-size:13px">No activity recorded yet.</div>';}
  else{
    daily.forEach(d=>{
      const rW=Math.round((d.recruiters/maxDaily)*120);
      const cW=Math.round((d.ceos/maxDaily)*120);
      const vW=Math.round((d.vcs/maxDaily)*120);
      const label=new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      html+=`<div class="daily-row">
        <div class="daily-date">${label}</div>
        <div class="daily-bars">
          ${d.recruiters?`<div class="daily-bar bar-blue" style="width:${rW}px;height:${Math.max(4,Math.round((d.recruiters/maxDaily)*20))}px" title="Recruiters: ${d.recruiters}"></div>`:''}
          ${d.ceos?`<div class="daily-bar bar-orange" style="width:${cW}px;height:${Math.max(4,Math.round((d.ceos/maxDaily)*20))}px" title="CEOs: ${d.ceos}"></div>`:''}
          ${d.vcs?`<div class="daily-bar bar-green" style="width:${vW}px;height:${Math.max(4,Math.round((d.vcs/maxDaily)*20))}px" title="VCs: ${d.vcs}"></div>`:''}
        </div>
        <div class="daily-total">${d.total}</div>
      </div>`;
    });
    html+=`<div style="display:flex;gap:16px;margin-top:10px">
      <span style="font-size:11px;display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;background:#3B82F6;border-radius:2px"></span>Recruiters</span>
      <span style="font-size:11px;display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;background:#F97316;border-radius:2px"></span>CEOs</span>
      <span style="font-size:11px;display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;background:#10B981;border-radius:2px"></span>VCs</span>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('main-content').innerHTML=html;
}

// ── LIST TABS ─────────────────────────────────────────
function currentData(){return TAB==='ceos'?CEOs:TAB==='vcs'?VCs:DATA;}
function nameField(item){return TAB==='ceos'?item.company:TAB==='vcs'?item.firm:item.name;}
function setFilter(f,btn){
  FILTER=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderList();
}
function renderList(){
  const q=(document.getElementById('search-input')||{}).value?.toLowerCase()||'';
  let items=currentData();
  const fMap={
    active:x=>['contacted','in conversation','draft','linkedin'].includes(x.status),
    draft:x=>x.status==='draft',contacted:x=>x.status==='contacted',
    'in conversation':x=>x.status==='in conversation',
    'not contacted':x=>x.status==='not contacted',
    bounced:x=>x.status==='bounced'||(x.contacts||[]).some(c=>c.status==='bounced'),
    passed:x=>x.status==='passed',
  };
  if(FILTER!=='all'&&fMap[FILTER])items=items.filter(fMap[FILTER]);
  if(q)items=items.filter(x=>nameField(x).toLowerCase().includes(q)||(x.why||'').toLowerCase().includes(q)||(x.notes||'').toLowerCase().includes(q)||(x.contacts||[]).some(c=>(c.name||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)));
  const all=currentData();
  const sMap=s=>all.filter(x=>x.status===s).length;
  const statHtml=[['Total',all.length],['Draft',sMap('draft')],['Contacted',sMap('contacted')],['In Convo',sMap('in conversation')],['Not Started',sMap('not contacted')],['Bounced',all.filter(x=>x.status==='bounced'||(x.contacts||[]).some(c=>c.status==='bounced')).length]].map(([l,v])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>`).join('');
  const cardsHtml=items.length?items.map(item=>{
    const id=item.id,name=nameField(item);
    const dotCls='sdot-'+(item.status||'not-contacted').replace(/ /g,'-');
    const tier=item.tier?`<span class="tier-badge">T${item.tier}</span>`:TAB==='ceos'?'<span class="tier-badge">CEO</span>':'<span class="tier-badge">VC</span>';
    const contacts=(item.contacts||[]).map(c=>{const cs='cs-'+(c.status||'not-contacted').replace(/ /g,'-');return`<div class="contact-row"><div class="contact-info"><div class="contact-name">${c.name}</div>${c.title?`<div class="contact-title">${c.title}</div>`:''} ${c.email?`<div class="contact-email">${c.email}</div>`:''} ${c.notes?`<div class="contact-notes">${c.notes}</div>`:''}</div><span class="cs-tag ${cs}">${c.status||'not contacted'}</span></div>`;}).join('');
    return`<div class="card"><div class="card-header" onclick="toggle('${TAB}',${id})">${tier}<div class="card-name">${name}</div><span class="status-lbl">${item.status||'not contacted'}</span><span class="sdot ${dotCls}"></span></div><div class="card-body" id="body-${TAB}-${id}"><div class="why">${item.why||''}</div>${contacts?`<div class="sec-lbl">Contacts</div>${contacts}`:''}<div class="sec-lbl" style="margin-top:10px">Notes & Status</div><div class="field-row"><textarea class="notes-input" id="notes-${TAB}-${id}">${item.notes||''}</textarea><div style="display:flex;flex-direction:column;gap:5px"><select class="status-select" id="status-${TAB}-${id}">${['not contacted','draft','linkedin','contacted','in conversation','bounced','passed'].map(s=>`<option value="${s}"${item.status===s?' selected':''}>${s}</option>`).join('')}</select><input class="date-input" type="date" id="followup-${TAB}-${id}" value="${item.followup_date||''}"><button class="save-btn" onclick="save('${TAB}',${id})">Save</button></div></div></div></div>`;
  }).join(''):'<div class="empty">No results.</div>';
  document.getElementById('main-content').innerHTML=`<div class="controls"><input class="search-box" type="text" id="search-input" placeholder="Search..." oninput="renderList()" value="${q}"><button class="filter-btn active" onclick="setFilter('all',this)">All</button><button class="filter-btn" onclick="setFilter('draft',this)">Draft</button><button class="filter-btn" onclick="setFilter('active',this)">Active</button><button class="filter-btn" onclick="setFilter('contacted',this)">Contacted</button><button class="filter-btn" onclick="setFilter('in conversation',this)">In Convo</button><button class="filter-btn" onclick="setFilter('not contacted',this)">Not Started</button><button class="filter-btn" onclick="setFilter('bounced',this)">Bounced</button></div><div class="stats">${statHtml}</div><div class="cards">${cardsHtml}</div>`;
}
function toggle(tab,id){document.getElementById(`body-${tab}-${id}`)?.classList.toggle('open');}
async function save(tab,id){
  const notes=document.getElementById(`notes-${tab}-${id}`).value;
  const status=document.getElementById(`status-${tab}-${id}`).value;
  const followup=document.getElementById(`followup-${tab}-${id}`).value;
  const ep=tab==='ceos'?'/api/ceos':tab==='vcs'?'/api/vcs':'/api/firms';
  await fetch(`${ep}/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','x-auth-token':TOKEN},body:JSON.stringify({notes,status,followup_date:followup||null})});
  await loadAll();
}
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.querySelector('.search-box')?.focus();}});
init();
</script>
